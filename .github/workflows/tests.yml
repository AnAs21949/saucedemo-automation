name: Selenium Tests

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (Chrome headless)
        run: |
          pytest tests/ \
            --browser=chrome \
            --html=reports/report.html \
            --self-contained-html \
            -v
        env:
          # Chrome runs headless in CI via webdriver-manager
          DISPLAY: ""

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/report.html
